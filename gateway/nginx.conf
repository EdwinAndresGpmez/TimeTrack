events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    map $http_x_tenant_slug_override $tenant_resolve_domain {
        default $host;
        "~.+$" "$http_x_tenant_slug_override.app.idefnova.com";
    }

    # =========================
    # UPSTREAMS
    # =========================
    upstream auth { server auth-ms:8000; }
    upstream patients { server patients-ms:8001; }
    upstream professionals { server professionals-ms:8002; }
    upstream schedule { server schedule-ms:8003; }
    upstream appointments { server appointments-ms:8004; }
    upstream notification { server notification-ms:8005; }
    upstream ia { server ia-ms:8006; }
    upstream portal { server portal-ms:8007; }
    upstream tenancy { server tenant-billing-ms:8008; }

    server {
        listen 80;

        # Tenant resolution via internal subrequest.
        auth_request /_tenant_resolve;
        auth_request_set $tenant_id $upstream_http_x_tenant_id;
        auth_request_set $tenant_slug $upstream_http_x_tenant_slug;
        auth_request_set $tenant_schema $upstream_http_x_tenant_schema;
        auth_request_set $tenant_signature $upstream_http_x_tenant_signature;
        auth_request_set $tenant_timestamp $upstream_http_x_tenant_timestamp;
        auth_request_set $tenant_domain $upstream_http_x_tenant_domain;
        auth_request_set $tenant_resolved $upstream_http_x_tenant_resolved;

        # =========================
        # PROXY HEADERS GLOBALES
        # =========================
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $tenant_id;
        proxy_set_header X-Tenant-Slug $tenant_slug;
        proxy_set_header X-Tenant-Schema $tenant_schema;
        proxy_set_header X-Tenant-Signature $tenant_signature;
        proxy_set_header X-Tenant-Timestamp $tenant_timestamp;
        proxy_set_header X-Tenant-Domain $tenant_domain;
        proxy_set_header X-Tenant-Resolved $tenant_resolved;

        # ✅ CLAVE: reenviar Authorization a todos los upstreams
        proxy_set_header Authorization $http_authorization;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering off;

        # =========================
        # CORS GLOBAL (CORREGIDO)
        # =========================
        # ⚠️ No uses "*" aquí, porque causa el error:
        # Access-Control-Allow-Origin contains multiple values 'http://localhost:5173, *'
        #
        # Usa el origin exacto del frontend.
        set $cors_origin "http://localhost:5173";

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-Slug-Override" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Manejo global de OPTIONS
        if ($request_method = OPTIONS) {
            return 204;
        }

        # =========================
        # RUTAS API v1
        # =========================
        location = /_tenant_resolve {
            internal;
            auth_request off;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header X-Original-Host $host;
            proxy_set_header X-Tenant-Slug-Override $http_x_tenant_slug_override;
            proxy_pass http://tenancy/api/v1/tenancy/gateway/resolve?domain=$tenant_resolve_domain;
        }

        location /api/v1/auth/ {
            proxy_pass http://auth;
        }

        location /api/v1/users/ {
            proxy_pass http://auth;
        }

        location /api/v1/pacientes/ {
            proxy_pass http://patients;
        }

        location /api/v1/staff/ {
            proxy_pass http://professionals;
        }

        location /api/v1/agenda/ {
            proxy_pass http://schedule;
        }

        location /api/v1/citas/ {
            proxy_pass http://appointments;
        }

        location /api/v1/notificaciones/ {
            proxy_pass http://notification;
        }

        location /api/v1/ia/ {
            proxy_pass http://ia;
        }

        location /api/v1/tenancy/ {
            auth_request off;
            proxy_pass http://tenancy;
        }

        location /api/v1/portal/ {
            # Evita duplicar headers CORS cuando portal-ms (django-cors-headers)
            # y Nginx intentan enviarlos al mismo tiempo.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_pass http://portal;
        }

        # =========================
        # Shortcut opcional
        # =========================
        location /api/citas/ {
            rewrite ^/api/citas/(.*)$ /api/v1/$1 break;
            proxy_pass http://appointments;
        }

        # =========================
        # MEDIA
        # =========================
        location /media/ {
            proxy_pass http://portal;
        }
    }
}
