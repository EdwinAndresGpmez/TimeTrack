services:
  # 1. Base de Datos (Usa variables del .env)
  db:
    image: postgres:15
    container_name: timetrack_db
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}         
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  redis:
    image: redis:alpine
    container_name: timetrack_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  auth-ms:
    build: ./microservices/auth-ms
    container_name: auth_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./microservices/auth-ms:/app
      - ./frontend/src/App.jsx:/app/source_feed/App.jsx
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=auth_db  
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  patients-ms:
    build: ./microservices/patients-ms
    container_name: patients_service
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - ./microservices/patients-ms:/app
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/patients_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  professionals-ms:
    build: ./microservices/professionals-ms
    container_name: professionals_service
    command: python manage.py runserver 0.0.0.0:8002
    volumes:
      - ./microservices/professionals-ms:/app
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/professionals_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  schedule-ms:
    build: ./microservices/schedule-ms
    container_name: schedule_service
    command: python manage.py runserver 0.0.0.0:8003
    volumes:
      - ./microservices/schedule-ms:/app
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/schedule_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  appointments-ms:
    build: ./microservices/appointments-ms
    container_name: appointments_service
    command: python manage.py runserver 0.0.0.0:8004
    volumes:
      - ./microservices/appointments-ms:/app
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/appointments_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  notification-ms:
    build: ./microservices/notification-ms
    container_name: notification_service
    command: python manage.py runserver 0.0.0.0:8005
    volumes:
      - ./microservices/notification-ms:/app
    ports:
      - "8005:8005"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/notifications_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  ia-ms:
    build: ./microservices/ia-ms
    container_name: ia_service
    command: python manage.py runserver 0.0.0.0:8006
    volumes:
      - ./microservices/ia-ms:/app
    ports:
      - "8006:8006"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/ia_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  portal-ms:
    build: ./microservices/portal-ms
    container_name: portal_service
    command: python manage.py runserver 0.0.0.0:8007
    volumes:
      - ./microservices/portal-ms:/app
      - media_portal_data:/app/media
    ports:
      - "8007:8007"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/portal_db
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300

  tenant-billing-ms:
    build: ./microservices/tenant-billing-ms
    container_name: tenant_billing_service
    command: python manage.py runserver 0.0.0.0:8008
    volumes:
      - ./microservices/tenant-billing-ms:/app
    ports:
      - "8008:8008"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/tenant_billing_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,tenancy,tenant-billing-ms
      - TENANT_HEADER_SIGNING_KEY=${JWT_SIGNING_KEY}
      - TENANT_SIGNATURE_REQUIRED=true
      - TENANT_SIGNATURE_MAX_SKEW_SEC=300
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8008)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gateway:
    image: nginx:latest
    container_name: api_gateway
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      auth-ms:
        condition: service_healthy
      tenant-billing-ms:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: frontend_app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      gateway:
        condition: service_healthy

volumes:
  postgres_data:
  media_portal_data:
